name: NPM Publish

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  github-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@adrianmross"

      - name: Test package
        run: npm run test:npm

      - name: Publish to GitHub Packages
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "$name@$version" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "$name@$version already exists in GitHub Packages; skipping."
            exit 0
          fi
          npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npmjs:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node for npmjs
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Test package
        run: npm run test:npm

      - name: Check npmjs token
        id: npm-token
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npmjs
        if: steps.npm-token.outputs.configured == 'true'
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "$name@$version" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "$name@$version already exists on npmjs; skipping."
            exit 0
          fi
          npm publish --access public --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npmjs publish
        if: steps.npm-token.outputs.configured != 'true'
        run: echo "NPM_TOKEN is not configured; skipping npmjs publish."
